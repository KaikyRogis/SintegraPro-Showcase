<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SintegraPro Showcase Media</title>
  <style>
    :root {
      --bg: #071525;
      --bg-2: #0b1d34;
      --panel: rgba(18, 35, 61, 0.94);
      --panel-soft: rgba(24, 45, 76, 0.92);
      --card: rgba(24, 45, 76, 0.95);
      --card-strong: rgba(28, 53, 88, 0.98);
      --border: rgba(96, 158, 255, 0.16);
      --border-strong: rgba(84, 188, 255, 0.38);
      --text: #eef5ff;
      --muted: #98aeca;
      --accent: #4ec7ff;
      --accent-2: #4d9dff;
      --success: #3bcf8e;
      --warning: #ffb869;
      --shadow: 0 26px 90px rgba(0, 0, 0, 0.34);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; font-family: "Segoe UI", system-ui, sans-serif; background: radial-gradient(circle at 18% 14%, rgba(73,160,255,0.20), transparent 32%), radial-gradient(circle at 82% 78%, rgba(61,230,189,0.16), transparent 24%), linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 65%, #0b2038 100%); color: var(--text); }
    body { padding: 28px; overflow: hidden; }

    .window {
      width: 100%; height: 100%; border-radius: 34px; overflow: hidden; border: 1px solid rgba(92, 136, 203, 0.2);
      background: linear-gradient(180deg, rgba(12, 27, 48, 0.97), rgba(10, 24, 43, 0.98)); box-shadow: var(--shadow);
      display: grid; grid-template-rows: 56px 1fr;
    }
    .titlebar {
      display: grid; grid-template-columns: 180px 1fr 180px; align-items: center; padding: 0 18px;
      border-bottom: 1px solid rgba(255,255,255,0.04); background: linear-gradient(180deg, rgba(10, 23, 41, 0.98), rgba(9, 20, 37, 0.94));
    }
    .traffic { display: flex; gap: 10px; }
    .traffic span { width: 11px; height: 11px; border-radius: 999px; background: rgba(111,141,190,0.7); }
    .title { text-align: center; font-size: 18px; font-weight: 700; color: #dce8fb; letter-spacing: 0.01em; }
    .window-actions { display: flex; justify-content: flex-end; gap: 12px; }
    .window-actions .btn {
      width: 40px; height: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); background: rgba(26,40,67,0.96); color: #eaf2ff;
      display: grid; place-items: center; font-size: 18px; line-height: 1;
    }

    .shell {
      display: grid; grid-template-columns: 272px 1fr; height: 100%;
    }
    .sidebar {
      padding: 26px 22px 22px; background: linear-gradient(180deg, rgba(18,34,58,0.98), rgba(15,29,50,0.97)); border-right: 1px solid rgba(255,255,255,0.04);
      display: flex; flex-direction: column; gap: 26px;
    }
    .brand { display: flex; gap: 16px; align-items: center; padding: 16px 14px; border-radius: 24px; background: rgba(16,28,49,0.74); border: 1px solid rgba(255,255,255,0.04); }
    .brand img { width: 54px; height: 54px; border-radius: 18px; }
    .brand h1 { margin: 0; font-size: 22px; }
    .brand p { margin: 6px 0 0; font-size: 13px; line-height: 1.35; color: var(--muted); max-width: 140px; }
    .nav { display: flex; flex-direction: column; gap: 12px; }
    .nav-item {
      border-radius: 20px; padding: 18px 18px; color: #d4e4fb; font-size: 16px; display: flex; align-items: center; gap: 14px;
      border: 1px solid transparent;
    }
    .nav-item.active { background: linear-gradient(180deg, rgba(30,74,116,0.92), rgba(22,60,100,0.98)); border-color: var(--border-strong); box-shadow: inset 0 0 0 1px rgba(104, 201, 255, 0.12); }
    .nav-item .icon { width: 18px; text-align: center; opacity: 0.9; }
    .main {
      padding: 28px 30px 32px; overflow: hidden; background: radial-gradient(circle at 18% 18%, rgba(71, 163, 255, 0.13), transparent 24%), radial-gradient(circle at 85% 78%, rgba(71, 214, 183, 0.11), transparent 20%), linear-gradient(180deg, rgba(10, 31, 54, 0.84), rgba(10, 25, 45, 0.88));
    }
    .topbar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 18px; }
    .profile { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 24px; background: rgba(20, 38, 63, 0.9); border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 14px 32px rgba(0,0,0,0.14); }
    .theme, .avatar { width: 46px; height: 46px; border-radius: 18px; display: grid; place-items: center; font-weight: 700; }
    .theme { background: rgba(34, 52, 83, 0.95); border: 1px solid rgba(255,255,255,0.08); }
    .avatar { background: linear-gradient(135deg, #2a8fff, #49c2ff); }
    .profile .name { font-weight: 700; }
    .ghost { padding: 10px 18px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); background: rgba(20,34,56,0.88); color: #eff5ff; font-weight: 600; }

    .page-title { font-size: 58px; line-height: 0.98; letter-spacing: -0.04em; margin: 8px 0 10px; }
    .page-subtitle { font-size: 21px; color: #c8d8ef; margin-bottom: 26px; max-width: 820px; }
    .content-grid { display: grid; gap: 18px; }
    .card { background: linear-gradient(180deg, rgba(19, 39, 67, 0.96), rgba(18, 35, 60, 0.98)); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: 0 18px 44px rgba(0,0,0,0.18); }
    .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .metric-card { padding: 28px 28px 24px; min-height: 128px; display: flex; justify-content: space-between; align-items: flex-start; }
    .metric-card h3 { margin: 0 0 10px; font-size: 18px; color: #adc0de; font-weight: 600; }
    .metric-card .value { font-size: 54px; font-weight: 800; letter-spacing: -0.05em; }
    .metric-card .glyph { width: 70px; height: 70px; border-radius: 24px; background: rgba(255,255,255,0.04); display: grid; place-items: center; font-size: 34px; }
    .wide-card { padding: 28px 28px; min-height: 138px; }
    .wide-card.center { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .cta { display: inline-flex; align-items: center; justify-content: center; border-radius: 18px; background: linear-gradient(135deg, var(--accent-2), var(--accent)); color: #05152a; font-weight: 800; padding: 16px 28px; box-shadow: 0 18px 44px rgba(78, 199, 255, 0.24); }
    .split { display: grid; grid-template-columns: 1.35fr 1fr; gap: 18px; }
    .list-placeholder { min-height: 136px; padding: 28px; }
    .list-placeholder h4 { margin: 0 0 14px; font-size: 20px; }
    .faint { color: var(--muted); }

    .panel-grid { display: grid; grid-template-columns: 1.18fr .82fr; gap: 18px; }
    .panel-card { padding: 26px; min-height: 360px; }
    .panel-card h3 { margin: 0 0 20px; font-size: 28px; }
    .dropzone { border: 1px dashed rgba(117, 171, 255, 0.18); border-radius: 24px; min-height: 168px; display: grid; place-items: center; background: rgba(255,255,255,0.02); margin-bottom: 20px; text-align: center; }
    .field, .select-row .field {
      width: 100%; background: rgba(14, 29, 50, 0.92); border: 1px solid rgba(255,255,255,0.06); color: var(--text); border-radius: 18px; padding: 18px 20px; font-size: 18px;
    }
    .row { display: flex; gap: 14px; align-items: center; }
    .stack { display: flex; flex-direction: column; gap: 14px; }
    .toggle-line, .radio-row { display: flex; align-items: center; gap: 14px; padding: 18px; border-radius: 20px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); }
    .small-note { font-size: 15px; color: var(--muted); }
    .status-grid { display: grid; grid-template-columns: 1fr auto; gap: 12px 18px; margin-top: 18px; color: #d8e7fa; }
    .status-grid .label { color: #93a6c3; }
    .pill { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 999px; background: rgba(77, 157, 255, 0.14); border: 1px solid rgba(77,157,255,0.26); font-size: 14px; }

    .filters { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr; gap: 14px; margin-bottom: 18px; }
    .table-card { padding: 22px; }
    table { width: 100%; border-collapse: collapse; font-size: 17px; }
    th, td { padding: 18px 10px; border-bottom: 1px solid rgba(255,255,255,0.06); text-align: left; }
    th { color: #95a8c4; font-weight: 700; }
    td { color: #edf3fd; }
    .action-btn { display: inline-flex; padding: 10px 18px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: #eef5ff; font-weight: 600; }
    .status-success { color: #8ce0ba; font-weight: 700; }

    .settings-grid { display: grid; gap: 18px; }
    .settings-card { padding: 26px; }
    .section-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .label { font-size: 16px; color: #aebfda; margin-bottom: 10px; }
    .summary-row { display: flex; justify-content: space-between; gap: 16px; color: #d5e4fb; font-size: 17px; }
    .summary-row small { display: block; color: #91a7c6; margin-bottom: 6px; }

    .help-grid { display: grid; grid-template-columns: 1.35fr 1fr; gap: 18px; }
    .help-list { display: flex; flex-direction: column; gap: 14px; margin-top: 18px; }
    .help-item { padding: 18px 20px; border-radius: 18px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); font-size: 18px; }

    .login-shell { display: grid; grid-template-columns: 1.25fr .9fr; gap: 26px; height: 100%; align-items: center; }
    .login-showcase { padding: 34px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); background: rgba(10, 22, 39, 0.4); min-height: 820px; display: flex; flex-direction: column; justify-content: center; }
    .login-brand { display: flex; gap: 20px; align-items: center; margin-bottom: 28px; }
    .login-brand img { width: 74px; height: 74px; border-radius: 24px; }
    .login-brand h2 { margin: 0; font-size: 28px; }
    .login-card { padding: 34px; border-radius: 30px; border: 1px solid rgba(98, 152, 231, 0.16); background: linear-gradient(180deg, rgba(20, 38, 66, 0.96), rgba(18, 35, 60, 0.98)); box-shadow: 0 24px 60px rgba(0,0,0,0.22); }
    .login-card h3 { font-size: 56px; margin: 0 0 18px; }
    .login-actions { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 24px; }

    .muted-hero { color: #b7c8df; font-size: 19px; max-width: 620px; }
    .caption { color: #98aeca; font-size: 14px; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="window" id="app"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const screen = params.get('screen') || 'dashboard';
    const titleMap = {
      dashboard: 'Dashboard',
      process: 'Processar SINTEGRA',
      history: 'Histórico',
      settings: 'Configurações',
      help: 'Ajuda',
      login: 'Acesso'
    };
    const navItems = [
      ['Dashboard','⌘','dashboard'],
      ['Processar SINTEGRA','＋','process'],
      ['Histórico','↻','history'],
      ['Configurações','☼','settings'],
      ['Ajuda','?','help']
    ];
    function shell(content, active) {
      return `
        <div class="titlebar">
          <div class="traffic"><span></span><span></span><span></span></div>
          <div class="title">SintegraPro · ${titleMap[screen] || 'Showcase'}</div>
          <div class="window-actions"><div class="btn">−</div><div class="btn">□</div><div class="btn">×</div></div>
        </div>
        <div class="shell">
          <aside class="sidebar">
            <div class="brand"><img src="../../assets/imagens/logo-redonda.png" alt="logo" /><div><h1>SintegraPro</h1><p>Correção e validação automática de arquivos SINTEGRA</p></div></div>
            <nav class="nav">${navItems.map(([label,icon,key]) => `<div class="nav-item ${active===key?'active':''}"><span class="icon">${icon}</span><span>${label}</span></div>`).join('')}</nav>
          </aside>
          <main class="main">
            <div class="topbar"><div class="profile"><div class="theme">☼</div><div class="avatar">SP</div><div><div class="name">Equipe Interna</div></div><button class="ghost">Sair</button></div></div>
            ${content}
          </main>
        </div>`;
    }
    const screens = {
      dashboard: shell(`
        <div class="caption">Visão operacional</div>
        <div class="page-title">Dashboard</div>
        <div class="content-grid">
          <div class="metric-grid">
            <div class="card metric-card"><div><h3>Processamentos hoje</h3><div class="value">18</div></div><div class="glyph">🗓</div></div>
            <div class="card metric-card"><div><h3>Erros hoje</h3><div class="value">2</div></div><div class="glyph">⏱</div></div>
            <div class="card metric-card"><div><h3>Arquivos 7 dias</h3><div class="value">143</div></div><div class="glyph">⬇</div></div>
            <div class="card metric-card"><div><h3>Última execução</h3><div class="value" style="font-size:32px">16:44</div></div><div class="glyph">◔</div></div>
          </div>
          <div class="card wide-card center">
            <div class="page-subtitle" style="margin:0 0 18px; max-width:none;">Ambiente pronto para processar arquivos fiscais com correção, validação e histórico operacional.</div>
            <div class="cta">Processar SINTEGRA</div>
          </div>
          <div class="split">
            <div class="card list-placeholder"><h4>Atividades recentes</h4><div class="faint">Execuções, correções aplicadas e eventos relevantes do ambiente.</div></div>
            <div class="card list-placeholder"><h4>Últimos relatórios</h4><div class="faint">Saídas geradas, status operacional e visão de acompanhamento.</div></div>
          </div>
        </div>
      `,'dashboard'),
      process: shell(`
        <div class="caption">Fluxo principal</div>
        <div class="page-title">Processar SINTEGRA</div>
        <div class="panel-grid">
          <div class="card panel-card">
            <h3>Arquivo</h3>
            <div class="dropzone"><div><div style="font-size:34px; font-weight:700; margin-bottom:10px;">Arraste o arquivo TXT aqui</div><div class="small-note" style="margin-bottom:18px;">ou selecione manualmente</div><div class="cta">Selecionar arquivo</div></div></div>
            <div class="label">Caminho completo</div>
            <div class="field">Nenhum arquivo selecionado</div>
            <div class="status-grid"><div class="label">Nome</div><div>-</div><div class="label">Tamanho</div><div>-</div><div class="label">Modificado</div><div>-</div></div>
          </div>
          <div class="stack">
            <div class="card panel-card" style="min-height:0;">
              <h3>Destino</h3>
              <div class="stack">
                <div class="radio-row">◉ <strong>Salvar ao lado do original</strong> <span class="small-note">Usa sufixo padrão e gera o TXT corrigido.</span></div>
                <div class="radio-row">○ <strong>Escolher destino</strong> <span class="small-note">Selecionar pasta de saída.</span></div>
                <div class="radio-row">○ <strong>Substituir original</strong> <span class="small-note">Requer confirmação e backup.</span></div>
              </div>
            </div>
            <div class="card panel-card" style="min-height:0;">
              <h3>Resultado</h3>
              <div class="status-grid"><div class="label">Status</div><div>Aguardando</div><div class="label">Saída</div><div>-</div><div class="label">Correções</div><div>0</div><div class="label">Registros ajustados</div><div>0</div></div>
              <div class="row" style="margin-top:22px;"><div class="ghost">Abrir TXT</div><div class="ghost">Abrir pasta</div></div>
            </div>
          </div>
        </div>
      `,'process'),
      history: shell(`
        <div class="caption">Rastreabilidade</div>
        <div class="page-title">Histórico</div>
        <div class="card table-card">
          <div class="row" style="margin-bottom:18px;"><div class="pill">Meu histórico</div><div class="pill">Histórico geral</div></div>
          <div class="filters">
            <div class="field">Buscar por empresa ou CNPJ</div>
            <div class="field">Todos status</div>
            <div class="field">Hoje</div>
            <div class="field">Todos os usuários</div>
          </div>
          <table>
            <thead><tr><th>Empresa</th><th>CNPJ</th><th>Última execução</th><th>Total</th><th>Última ação</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>
              <tr><td>Distribuidora Alfa Ltda</td><td>12.345.678/0001-90</td><td>07/04/2026, 15:34:55</td><td>1</td><td><span class="pill">Correção de IE</span></td><td class="status-success">Sucesso</td><td><span class="action-btn">Abrir</span></td></tr>
              <tr><td>Comercial Horizonte Ltda</td><td>98.765.432/0001-11</td><td>07/04/2026, 15:10:35</td><td>2</td><td><span class="pill">Sem alterações</span></td><td class="status-success">Sucesso</td><td><span class="action-btn">Abrir</span></td></tr>
              <tr><td>Mercearia Central Ltda</td><td>22.567.994/0001-65</td><td>07/04/2026, 14:20:31</td><td>1</td><td><span class="pill">Sem alterações</span></td><td class="status-success">Sucesso</td><td><span class="action-btn">Abrir</span></td></tr>
            </tbody>
          </table>
        </div>
      `,'history'),
      settings: shell(`
        <div class="caption">Servidor e estação</div>
        <div class="page-title">Configurações</div>
        <div class="settings-grid">
          <div class="card settings-card">
            <div class="row" style="margin-bottom:16px;"><div class="pill">Estação</div><div class="pill">Sistema</div><div class="pill">Logs</div></div>
            <div class="label">Ambiente</div><div class="field">Estação</div>
            <div class="label" style="margin-top:18px;">API do SintegraPro (Host/IP)</div><div class="field">10.0.0.25</div>
            <div class="small-note" style="margin-top:10px;">Informe o host do servidor SintegraPro para conectar esta estação.</div>
            <div class="row" style="margin-top:18px;"><div class="field" style="max-width:130px;">7777</div><div class="ghost">Testar conexão</div><div class="ghost">Salvar</div></div>
          </div>
          <div class="card settings-card">
            <div class="section-title"><h3 style="margin:0; font-size:28px;">Backup e restauração</h3><div class="ghost">Mais opções</div></div>
            <div class="summary-row"><div><small>Resumo</small>Backup automático ativo • Última execução 16:41</div><div><small>Status</small>Pronto</div></div>
          </div>
          <div class="card settings-card">
            <div class="section-title"><h3 style="margin:0; font-size:28px;">Atualizações</h3><div class="ghost">Mais opções</div></div>
            <div class="summary-row"><div><small>Status</small>ready</div><div><small>Versão alvo</small>1.0.25</div><div><small>Manutenção</small>Desativado</div></div>
          </div>
          <div class="card settings-card">
            <div class="section-title"><h3 style="margin:0; font-size:28px;">Diagnóstico do sistema</h3><div class="ghost">Mais opções</div></div>
            <div class="summary-row"><div><small>Versão do app</small>1.0.25</div><div><small>API status</small>UP (db-online)</div></div>
          </div>
        </div>
      `,'settings'),
      help: shell(`
        <div class="caption">Guias operacionais</div>
        <div class="page-title">Ajuda</div>
        <div class="help-grid">
          <div class="card panel-card">
            <div class="row"><div class="pill">Guia rápido</div><div class="pill">FAQ</div><div class="pill">Suporte</div></div>
            <div class="help-list">
              <div class="help-item">1. Selecionar arquivo SINTEGRA (.txt)</div>
              <div class="help-item">2. Escolher a saída do arquivo corrigido</div>
              <div class="help-item">3. Processar com backup seguro e validação</div>
              <div class="help-item">4. Validar o resultado e salvar na pasta do cliente</div>
            </div>
          </div>
          <div class="card panel-card">
            <h3>O que o sistema faz automaticamente</h3>
            <div class="help-list">
              <div class="help-item">Corrige IE quando necessário e preserva o restante do arquivo</div>
              <div class="help-item">Gera registros auxiliares quando há frete e ajusta a ordem dos totais</div>
              <div class="help-item">Mostra “Sem alterações” quando o arquivo já está consistente</div>
            </div>
          </div>
        </div>
      `,'help'),
      login: `
        <div class="titlebar">
          <div class="traffic"><span></span><span></span><span></span></div>
          <div class="title">SintegraPro · Acesso</div>
          <div class="window-actions"><div class="btn">−</div><div class="btn">□</div><div class="btn">×</div></div>
        </div>
        <main class="main" style="padding:34px;">
          <div class="login-shell">
            <section class="login-showcase">
              <div class="login-brand"><img src="../../assets/imagens/logo-redonda.png" alt="logo" /><div><h2>SintegraPro</h2><div class="muted-hero" style="font-size:16px; margin-top:8px; max-width:420px;">Correção e validação automática de arquivos SINTEGRA</div></div></div>
              <div class="page-title" style="font-size:74px; max-width:760px;">Controle total do seu SINTEGRA.</div>
              <div class="page-subtitle" style="max-width:560px;">Correções automáticas, validação inteligente e histórico completo com a mesma identidade visual do instalador.</div>
            </section>
            <section class="login-card">
              <h3>Entrar</h3>
              <div class="label">E-mail</div><div class="field">demo@empresa.local</div>
              <div class="label" style="margin-top:16px;">Senha</div><div class="row"><div class="field" style="flex:1;">••••••••</div><div class="ghost">Mostrar</div></div>
              <div class="login-actions"><div class="small-note">Lembrar-me</div><div class="ghost">Remover usuário</div></div>
              <div class="cta" style="width:100%;">Entrar</div>
            </section>
          </div>
        </main>`
    };
    document.getElementById('app').innerHTML = screens[screen] || screens.dashboard;
  </script>
</body>
</html>
